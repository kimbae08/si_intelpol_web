<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistem Informasi Intelijen — prototipe dashboard situasi nasional (UI/UX konsep, data simulasi)." />
  <title>Sistem Informasi Intelijen | Dashboard Situasi Nasional</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23081727'/%3E%3Ctext x='32' y='42' font-family='Segoe UI,Arial,sans-serif' font-size='28' font-weight='700' fill='%2329d7ff' text-anchor='middle'%3ESI%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-gate" id="authGate">
    <form class="auth-card" id="authForm" autocomplete="off">
      <div class="auth-logo">SI</div>
      <h1>Sistem Informasi Intelijen</h1>
      <p>Masukkan kode akses untuk membuka dashboard prototipe.</p>
      <input id="authCode" type="password" inputmode="text" placeholder="Kode akses" aria-label="Kode akses" autocomplete="off" />
      <button type="submit" class="btn primary auth-submit">Masuk</button>
      <span class="auth-error" id="authError" role="alert"></span>
      <small>Prototype • data simulasi</small>
    </form>
  </div>

  <div class="app-shell">
    <div class="brand-cell">
      <button class="icon-button mobile-toggle" id="mobileToggle" aria-label="Buka menu">☰</button>
      <div class="emblem" aria-hidden="true">
        <svg viewBox="0 0 48 48" width="44" height="44">
          <circle cx="24" cy="24" r="21" fill="#0b1c30" stroke="#e8c15a" stroke-width="2"/>
          <path d="M24 11 l1.6 3.4 -1.6 -.9 -1.6 .9 z" fill="#e8c15a"/>
          <path d="M24 15 C18 15 12 18.5 8 25.5 C15 23.5 20 23.5 24 29.5 C28 23.5 33 23.5 40 25.5 C36 18.5 30 15 24 15 Z" fill="#e8c15a"/>
          <path d="M20.5 28.5 h7 l-1 6 -2.5 2.6 -2.5 -2.6 z" fill="#e8c15a"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Sistem Informasi Intelijen</h1>
        <span>Dashboard Situasi Nasional</span>
      </div>
    </div>

    <header class="topbar">
      <div class="search-wrap">
        <span>⌕</span>
        <input id="globalSearch" type="search" placeholder="Cari laporan, lokasi, atau kata kunci..." />
      </div>
      <div class="top-actions">
        <div class="datetime">
          <small id="dateText">Jumat, 3 Juli 2026</small>
          <strong id="timeText">00:00:00 WIB</strong>
        </div>
        <button class="icon-button badge" title="Notifikasi" aria-label="Notifikasi">🔔<span>12</span></button>
        <button class="icon-button" title="Pesan" aria-label="Pesan">✉</button>
        <div class="profile">
          <div class="avatar">A</div>
          <div class="profile-name">
            <strong>Admin Intelijen</strong>
            <small>Administrator</small>
          </div>
          <span class="profile-caret">▾</span>
        </div>
      </div>
    </header>

    <aside class="sidebar" id="sidebar">
      <nav class="nav" id="navMenu" aria-label="Navigasi utama"></nav>

      <div class="system-mini">
        <div class="sys-block"><label>STATUS SISTEM</label><div class="sys-val"><span class="pulse green"></span>Aman</div></div>
        <div class="sys-block"><label>KONEKSI</label><div class="sys-val"><span class="pulse cyan"></span>Terhubung <i class="wifi">▮▮▮</i></div></div>
        <div class="sys-block"><label>SISTEM TERINTEGRASI</label><div class="sys-ver">VER. 2.5.1.280525</div></div>
      </div>
    </aside>

    <main class="main">
      <section class="content-header">
        <div>
          <p class="eyebrow" id="pageEyebrow">Command Center</p>
          <h2 id="pageTitle">Beranda</h2>
        </div>
        <div class="quick-actions">
          <button class="btn ghost">Export Ringkas</button>
          <button class="btn primary">+ Laporan Baru</button>
        </div>
      </section>

      <section class="page-content" id="pageContent"></section>
    </main>
  </div>

  <template id="chartTemplate">
    <svg viewBox="0 0 600 220" class="line-chart" aria-label="Grafik tren laporan">
      <defs>
        <linearGradient id="areaFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="rgba(64, 156, 255, .42)"/>
          <stop offset="100%" stop-color="rgba(64, 156, 255, 0)"/>
        </linearGradient>
      </defs>
      <path class="grid-line" d="M45 30 H575 M45 75 H575 M45 120 H575 M45 165 H575" />
      <path class="area" d="M45 162 L110 104 L175 132 L240 76 L305 144 L370 111 L435 84 L500 126 L575 70 L575 190 L45 190 Z" />
      <path class="line" d="M45 162 L110 104 L175 132 L240 76 L305 144 L370 111 L435 84 L500 126 L575 70" />
      <g class="dots">
        <circle cx="45" cy="162" r="5"/><circle cx="110" cy="104" r="5"/><circle cx="175" cy="132" r="5"/><circle cx="240" cy="76" r="5"/><circle cx="305" cy="144" r="5"/><circle cx="370" cy="111" r="5"/><circle cx="435" cy="84" r="5"/><circle cx="500" cy="126" r="5"/><circle cx="575" cy="70" r="5"/>
      </g>
      <text x="45" y="214">24 Jun</text><text x="155" y="214">26 Jun</text><text x="270" y="214">28 Jun</text><text x="385" y="214">30 Jun</text><text x="520" y="214">2 Jul</text>
    </svg>
  </template>

  <script src="app.js"></script>
</body>
</html>
